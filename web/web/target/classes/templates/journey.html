<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey - My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="jour-page"> 

    <nav>
        <h2 class="tlt" th:text="${name}">My Portfolio</h2>
        <div class="navbary">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/journey}">Journey</a>
            <a th:href="@{/skills}">Skills</a>
            <a th:href="@{/gallery}">Gallery</a>
        </div>
    </nav>

    <main class="journey-main">
        <h1 class="journey-header">JOURNEY</h1>

        <div class="slider-wrapper">
            <div class="slider-container">
                <div th:each="imgName : ${sliderImages}" class="mySlides fade">
                    <img th:src="@{'/image/' + ${imgName}}" class="slider-img">
                </div>
                <button class="arrow left-arrow" onclick="plusSlides(-1)">&#10094;</button>
                <button class="arrow right-arrow" onclick="plusSlides(1)">&#10095;</button>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="content-row reveal-left">
                <div class="content-box">
                    <ul>
                        <li th:each="item : ${list1}" th:text="${item}"></li>
                    </ul>
                </div>
                <div class="content-title">
                    <h3 th:text="${boxTitle1}"></h3>
                </div>
            </div>

            <div class="content-row row-reverse reveal-right">
                <div class="content-box">
                    <ul>
                        <li th:each="item : ${list2}" th:text="${item}"></li>
                    </ul>
                </div>
                <div class="content-title">
                    <h3 th:text="${boxTitle2}"></h3>
                </div>
            </div>

            <div class="content-row reveal-left">
                <div class="content-box">
                    <ul>
                        <li th:each="item : ${list3}" th:text="${item}"></li>
                    </ul>
                </div>
                <div class="content-title">
                    <h3 th:text="${boxTitle3}"></h3>
                </div>
            </div>

            <div class="content-row row-reverse reveal-right">
                <div class="content-box">
                    <ul>
                        <li th:each="item : ${list4}" th:text="${item}"></li>
                    </ul>
                </div>
                <div class="content-title">
                    <h3 th:text="${boxTitle4}"></h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="simple-footer">
        <p>
            &copy; 2026 <strong th:text="${fullName}">Lorraine Geronimo</strong>
            | Let's connect: <a th:href="${fbLink}" target="_blank" class="myfbacc">Fb.acc</a> 
            | All Rights Reserved
        </p>
    </footer>

    <script>
        let slideIndex = 0;
        let timeoutId;
        showSlides();

        function plusSlides(n) {
            clearTimeout(timeoutId);
            showSlidesManual(slideIndex += n);
        }

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            if (slides.length === 0) return;
            for (i = 0; i < slides.length; i++) { 
                slides[i].style.display = "none"; 
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }    
            slides[slideIndex-1].style.display = "block";  
            timeoutId = setTimeout(showSlides, 3000); 
        }

        function showSlidesManual(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            if (slides.length === 0) return;
            if (n > slides.length) { slideIndex = 1 }    
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) { 
                slides[i].style.display = "none"; 
            }
            slides[slideIndex-1].style.display = "block";
            timeoutId = setTimeout(showSlides, 5000); 
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.content-row').forEach(row => {
            observer.observe(row);
        });
    </script>
</body>
</html>
